<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
        }
        .container{
            overflow-y: auto;
            width: 100%;
            height: 100%;
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 30rem;
        }
        .card{
            border-radius: 20px 20px 20px 0;

            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .card:hover img{
            transform: scale(1.05);
        }
        .card:hover .nummberspan{
            background-color: #1b1b1b;
            color: white;
        }
        img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s ease;
        }
        .number{
            position: absolute;
            width: 90px;
            height: 90px;
            background-color: rgb(255, 249, 249);
            bottom: 0;
            border-radius: 0 40px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .rightBot{
           
            width: 24px;
            height: 24px;
            position: absolute;
            bottom: 0;
            right: -24px;
            border-radius: 0 20px 0px 5px;
             transform: rotate(270deg); 
        }
        .topLeft{
            width: 24px;
            height: 24px;
            position: absolute;
            top: -24px;
            left: 0;
            border-radius: 0 20px 0px 5px;
             transform: rotate(270deg); 
        }
        .nummberspan{
            background-color: #f5b754;
            height: 60px;
            width: 60px;
            border-radius: 100%;
            text-align: center;
            font-size: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color .5s ease,  color .5s ease;
        }
        .bottomfade{
            width: 100%;
            top: 41%;
            height: 60%;
            float: left;
            position: absolute;
            background: linear-gradient(to top, #000000 0%, rgba(0, 0, 0, 0.738) 19%, rgba(0, 0, 0, 0.541) 34%, rgba(0, 0, 0, 0.382) 47%, rgba(0, 0, 0, 0.278) 56.5%, rgba(0, 0, 0, 0.194) 65%, rgba(0, 0, 0, 0.126) 73%, rgba(0, 0, 0, 0.075) 80.2%, rgba(0, 0, 0, 0.042) 86.1%, rgba(0, 0, 0, 0.021) 91%, rgba(0, 0, 0, 0.008) 95.2%, rgba(0, 0, 0, 0.002) 98.2%, transparent 100%);
        }
    </style>
</head>
